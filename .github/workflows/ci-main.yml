name: CI – main branch

on:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/ tests/

      - name: Type check
        run: mypy src/

  unit-test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Unit tests
        run: pytest tests/unit/ --cov=src --cov-report=xml -q
        env:
          DATABASE_URL: ""   # unit tests use mocks

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml

  full-eval:
    runs-on: ubuntu-latest
    needs: unit-test

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: portfolio_health
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/portfolio_health
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_MODEL: claude-sonnet-4-6
      MODEL_PATH: models/health_scorer.ubj
      FEATURE_BASELINE_PATH: models/feature_baseline.parquet

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Seed CI data
        run: python -m scripts.seed_ci_data

      - name: Ingest prices for CI portfolio
        run: python -m scripts.ingest_prices

      - name: Train model
        run: python -m src.ml.train

      - name: Full eval (gate ≥85%, tool correctness 100%)
        run: python -m scripts.run_eval --tier full

  build-push:
    runs-on: ubuntu-latest
    needs: full-eval
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev

      - name: Build and push prod image
        env:
          IMAGE: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/portfolio-health/api:${{ github.sha }}
        run: |
          docker build --target prod -t "$IMAGE" .
          docker push "$IMAGE"

  deploy:
    runs-on: ubuntu-latest
    needs: build-push
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        env:
          IMAGE: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/portfolio-health/api:${{ github.sha }}
          # MODEL_VERSION is a repository variable (not secret) for rollback auditability.
          # Override: MODEL_VERSION=v1.2.0 gh workflow run ci-main.yml
          MODEL_VERSION: ${{ vars.MODEL_VERSION }}
        run: |
          gcloud run deploy portfolio-health-agent \
            --image "$IMAGE" \
            --region "${{ secrets.GCP_REGION }}" \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "APP_ENV=production,MODEL_VERSION=${MODEL_VERSION}" \
            --set-secrets "ANTHROPIC_API_KEY=anthropic-api-key:latest,DATABASE_URL=database-url:latest,GCS_BUCKET=gcs-bucket:latest"
