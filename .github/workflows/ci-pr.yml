name: CI – PR gate

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.9"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/ tests/

      - name: Type check
        run: mypy src/

  unit-test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.9"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Unit tests
        run: pytest tests/unit/ --cov=src --cov-report=xml -q
        env:
          DATABASE_URL: ""   # unit tests use mocks

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml

  smoke-eval:
    runs-on: ubuntu-latest
    needs: unit-test

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: portfolio_health
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/portfolio_health
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_MODEL: claude-sonnet-4-6
      MODEL_PATH: models/health_scorer.ubj
      FEATURE_BASELINE_PATH: models/feature_baseline.parquet

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.9"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Seed CI data
        run: python -m scripts.seed_ci_data

      - name: Ingest prices for CI portfolio
        run: python -m scripts.ingest_prices

      - name: Train model (smoke artifact)
        run: python -m src.ml.train

      - name: Smoke eval (gate ≥80%, tool correctness 100%)
        run: python -m scripts.run_eval --tier smoke
